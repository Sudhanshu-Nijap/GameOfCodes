<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StegoReveal | Digital Forensics</title>
  <meta name="description" content="Hide and reveal secret messages in images using LSB steganography.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>StegoReveal</h1>
      <p class="subtitle">Hide &amp; extract secret intelligence from digital imagery</p>
    </header>

    <main>
      <div class="upload-card">
        <!-- Mode Selector -->
        <div class="mode-selector">
          <button class="mode-btn active" id="decodeMode">🔍 Decode</button>
          <button class="mode-btn" id="encodeMode">🔒 Encode</button>
        </div>

        <!-- Secret Message Input (encode only) -->
        <div class="input-group" id="messageInputGroup" style="display:none;">
          <label class="field-label" for="secretMessage">SECRET MESSAGE</label>
          <textarea id="secretMessage" placeholder="Enter the text you want to hide in the image..."></textarea>
        </div>

        <!-- Drop Zone -->
        <label for="imageUpload" class="drop-zone" id="dropZone">
          <div class="upload-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
          </div>
          <div class="upload-text" id="uploadText">Upload Image to Decode</div>
          <div class="upload-hint">PNG or JPG — Drag &amp; drop or click to browse</div>
          <input type="file" id="imageUpload" accept="image/png,image/jpeg">
        </label>

        <!-- Loader -->
        <div class="loading" id="loader">
          <div class="spinner"></div>
          <p>Processing via Python backend...</p>
        </div>

        <!-- Preview -->
        <img id="imagePreview" src="" alt="Preview" style="display:none;">

        <!-- Result -->
        <div class="result-area" id="resultArea" style="display:none;">
          <div class="message-box">
            <div class="message-label" id="resultLabel">RESULT</div>
            <div id="revealedMessage"></div>
          </div>
        </div>
      </div>

      <!-- API Status Badge -->
      <div class="api-badge" id="apiBadge">
        <span class="dot" id="apiDot"></span>
        <span id="apiStatus">Checking API...</span>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
